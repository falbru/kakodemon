name: CI

on: [push]

jobs:
  build-format-lint:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Initialize submodules
      run: git submodule update --init --recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libwayland-dev libxkbcommon-dev libfreetype-dev libfontconfig-dev clang-format clang-tidy

    - name: Install Kakoune v2026.04.12
      run: |
        wget https://github.com/mawww/kakoune/releases/download/v2026.04.12/kakoune-v2026.04.12-linux.tar.bz2
        tar -xf ./kakoune-v2026.04.12-linux.tar.bz2
        sudo cp ./kakoune-v2026.04.12-linux/bin/kak /usr/local/bin/
        sudo cp -r ./kakoune-v2026.04.12-linux/share/* /usr/local/share/

    - name: Copy Kakoune configuration
      run: |
        mkdir -p ~/.config/kak/autoload
        cp -r rc/* ~/.config/kak/autoload/

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DBUILD_TESTS=ON

    - name: Build with CMake
      run: |
        cmake --build build --config Release

    - name: Run tests
      run: |
        cd build && ctest --output-on-failure

    - name: Run clang-format check
      run: |
        find src/ test/ -name '*.cpp' -o -name '*.hpp' -exec clang-format --style=Microsoft --dry-run --Werror {} \;

    - name: Run clang-tidy
      run: |
        find src/ test/ -name '*.cpp' -o -name '*.hpp' -exec clang-tidy -p build {} \;
